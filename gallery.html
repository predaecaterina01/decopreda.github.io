<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Deco Preda — Full portfolio gallery. Microcement, resin systems, stone carpet across residential, commercial and industrial applications." />
  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Gallery — Deco Preda" />
  <meta property="og:description" content="Portfolio of completed surface projects — residential, commercial, industrial and exterior." />
  <meta property="og:image"       content="https://predaecaterina01.github.io/images/residential/bathroom/mc-ivory-bathroom-01.webp" />
  <meta property="og:url"         content="https://predaecaterina01.github.io/gallery.html" />
  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Gallery — Deco Preda" />
  <meta name="twitter:description" content="Portfolio of completed surface projects — residential, commercial, industrial and exterior." />
  <meta name="twitter:image"       content="https://predaecaterina01.github.io/images/residential/bathroom/mc-ivory-bathroom-01.webp" />
  <title>Gallery — Deco Preda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { cursor: auto; }
    a, button { cursor: auto; }
    .gal-page {
      background: var(--ivory);
      min-height: 100vh;
      padding-top: calc(var(--nav-h) + clamp(40px, 5vw, 64px));
      padding-bottom: var(--s-2xl);
    }
    .gal-head {
      max-width: var(--max);
      margin-inline: auto;
      padding-inline: var(--gut);
      margin-bottom: clamp(40px, 5vw, 64px);
    }
    .gal-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone-l);
      margin-bottom: clamp(24px, 3vw, 40px);
      transition: color var(--dur-fast), gap var(--dur-mid) var(--ease);
    }
    .gal-back:hover { color: var(--ink); gap: 12px; }
    .gal-head__title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: var(--t-h2);
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: clamp(24px, 3vw, 36px);
    }
    .gal-head__title em { font-style: italic; color: var(--stone); }
    .gal-filters {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--sand);
    }
    .gal-filter {
      position: relative;
      padding: 12px 22px;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone-l);
      background: transparent;
      border: none;
      transition: color var(--dur-fast);
      cursor: pointer;
    }
    .gal-filter::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--ink);
      transition: width var(--dur-mid) var(--ease);
    }
    .gal-filter:hover { color: var(--ink); }
    .gal-filter.active { color: var(--ink); }
    .gal-filter.active::after { width: 100%; }
    .gal-count {
      margin-left: auto;
      font-family: var(--sans);
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--stone-l);
      padding: 12px 0;
    }
    .gal-grid {
      max-width: var(--max);
      margin-inline: auto;
      padding-inline: var(--gut);
      padding-top: clamp(24px, 3vw, 40px);
      columns: 3;
      column-gap: 3px;
    }
    .gal-item {
      break-inside: avoid;
      margin-bottom: 3px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .gal-item[data-hidden="true"] { display: none; }
    .gal-swatch {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .gal-item:hover .gal-swatch { transform: scale(1.04); }
    .gal-item__over {
      position: absolute;
      inset: 0;
      background: rgba(15, 14, 12, 0);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      transition: background var(--dur-mid) var(--ease);
    }
    .gal-item:hover .gal-item__over { background: rgba(15, 14, 12, 0.42); }
    .gal-item__name {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(246, 243, 238, 0);
      transform: translateY(8px);
      transition: color var(--dur-mid) var(--ease), transform var(--dur-mid) var(--ease);
    }
    .gal-item__mat {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(183, 174, 163, 0);
      transform: translateY(8px);
      transition: color var(--dur-mid) var(--ease) 0.05s, transform var(--dur-mid) var(--ease) 0.05s;
      margin-top: 4px;
    }
    .gal-item:hover .gal-item__name { color: rgba(246, 243, 238, 0.95); transform: translateY(0); }
    .gal-item:hover .gal-item__mat  { color: rgba(183, 174, 163, 0.75); transform: translateY(0); }
    .gal-item__expand {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(246, 243, 238, 0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(246, 243, 238, 0);
      transition: all var(--dur-mid) var(--ease);
    }
    .gal-item:hover .gal-item__expand {
      border-color: rgba(246, 243, 238, 0.5);
      color: rgba(246, 243, 238, 0.9);
    }
    .gal-loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      font-family: var(--sans);
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone-l);
    }
    @media (max-width: 900px) { .gal-grid { columns: 2; } }
    @media (max-width: 500px) { .gal-grid { columns: 1; } }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(10, 9, 8, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-lg);
      pointer-events: none;
      transition: background 0.4s var(--ease);
    }
    .lightbox.open { background: rgba(10, 9, 8, 0.92); pointer-events: all; }
    .lb-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
    }
    .lightbox.open .lb-inner { opacity: 1; transform: scale(1); }
    .lb-surface { display: block; width: 100%; border: none; }
    .lb-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 16px 0 0;
    }
    .lb-name {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(20px, 2.5vw, 28px);
      color: var(--dark-text);
    }
    .lb-mat {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--dark-muted);
    }
    .lb-close {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(183, 174, 163, 0.2);
      border-radius: 50%;
      color: var(--dark-muted);
      background: transparent;
      transition: border-color var(--dur-fast), color var(--dur-fast);
      cursor: pointer;
    }
    .lb-close:hover { border-color: rgba(183, 174, 163, 0.6); color: var(--dark-text); }
    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(183, 174, 163, 0.2);
      border-radius: 50%;
      color: var(--dark-muted);
      background: transparent;
      transition: border-color var(--dur-fast), color var(--dur-fast);
      cursor: pointer;
    }
    .lb-nav:hover { border-color: rgba(183, 174, 163, 0.6); color: var(--dark-text); }
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }
    .lb-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--sans);
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.28em;
      color: var(--dark-muted);
    }
  </style>
</head>
<body>

  <nav class="nav on-light" id="nav" aria-label="Primary">
    <a href="index.html" class="nav__wordmark" aria-label="Deco Preda home">
      DECO<span class="nav__wordmark-thin">PREDA</span>
    </a>
    <button class="nav__burger" id="navBurger" aria-label="Open menu" aria-expanded="false" aria-controls="navPanel">
      <span></span><span></span>
    </button>
    <div class="nav__panel" id="navPanel" aria-hidden="true">
      <a href="index.html#who-we-are"  class="nav__item" data-cursor="link">Who We Are</a>
      <a href="index.html#systems"     class="nav__item" data-cursor="link">Systems</a>
      <a href="index.html#projects"    class="nav__item" data-cursor="link">Projects</a>
      <a href="index.html#craft"       class="nav__item" data-cursor="link">Craft</a>
      <a href="signature-series.html"  class="nav__item" data-cursor="link">Signature Series</a>
      <a href="gallery.html"           class="nav__item" data-cursor="link">Gallery</a>
      <a href="index.html#contact"     class="nav__item nav__item--cta" data-cursor="link">Contact</a>
    </div>
  </nav>

  <main class="gal-page">
    <div class="gal-head">
      <a href="index.html" class="gal-back">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to studio
      </a>

      <h1 class="gal-head__title">
        The complete work.<br>
        <em>Every surface. Every scale.</em>
      </h1>

      <div class="gal-filters" role="tablist" aria-label="Filter by space">
        <button class="gal-filter active" data-filter="all"        role="tab" aria-selected="true"  type="button">All</button>
        <button class="gal-filter"        data-filter="residential" role="tab" aria-selected="false" type="button">Residential</button>
        <button class="gal-filter"        data-filter="commercial"  role="tab" aria-selected="false" type="button">Commercial</button>
        <button class="gal-filter"        data-filter="industrial"  role="tab" aria-selected="false" type="button">Industrial</button>
        <button class="gal-filter"        data-filter="exterior"    role="tab" aria-selected="false" type="button">Exterior</button>
        <button class="gal-filter"        data-filter="signature"   role="tab" aria-selected="false" type="button">Signature</button>
        <span class="gal-count" id="galCount"></span>
      </div>
    </div>

    <div class="gal-grid" id="galGrid" role="list">
      <div class="gal-loading" id="galLoading">Loading gallery&hellip;</div>
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image detail view">
    <div class="lb-inner" id="lbInner">
      <img class="lb-surface" id="lbSurface" src="" alt="" />
      <div class="lb-meta">
        <span class="lb-name" id="lbName"></span>
        <span class="lb-mat"  id="lbMat"></span>
      </div>
    </div>
    <button class="lb-close" id="lbClose" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    </button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="lb-counter" id="lbCounter"></span>
  </div>

  <script>
  'use strict';

  const EXPAND_ICON = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2h3M2 2v3M10 2H7M10 2v3M2 10h3M2 10V7M10 10H7M10 10V7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>`;

  let allItems = [];

  /* ── Flatten JSON into a flat array of image objects ── */
  function flattenData(data) {
    const items = [];

    function addItems(arr, filter) {
      if (!Array.isArray(arr)) return;
      arr.forEach(img => {
        items.push({
          src:      img.src,
          name:     img.name     || '',
          material: img.material || '',
          location: img.location || '',
          filter:   filter
        });
      });
    }

    /* residential */
    if (data.residential) {
      Object.values(data.residential).forEach(arr => addItems(arr, 'residential'));
    }
    /* commercial */
    if (data.commercial) {
      Object.values(data.commercial).forEach(arr => addItems(arr, 'commercial'));
    }
    /* industrial */
    if (Array.isArray(data.industrial)) {
      addItems(data.industrial, 'industrial');
    }
    /* exterior */
    if (data.exterior) {
      Object.values(data.exterior).forEach(arr => addItems(arr, 'exterior'));
    }
    /* signature */
    if (Array.isArray(data.signature)) {
      addItems(data.signature, 'signature');
    }

    return items;
  }

  /* ── Build a single gallery card ── */
  function buildCard(img) {
    const div = document.createElement('div');
    div.className   = 'gal-item';
    div.role        = 'listitem';
    div.tabIndex    = 0;
    div.dataset.filter   = img.filter;
    div.dataset.hidden   = 'false';
    div.dataset.name     = img.name;
    div.dataset.material = img.material;
    div.dataset.location = img.location;
    div.dataset.src      = img.src;

    div.innerHTML = `
      <img
        class="gal-swatch"
        src="images/${img.src}"
        alt="${img.name}"
        loading="lazy"
        decoding="async"
      />
      <div class="gal-item__over">
        <div class="gal-item__expand">${EXPAND_ICON}</div>
        <span class="gal-item__name">${img.name}</span>
        <span class="gal-item__mat">${img.material}</span>
      </div>`;

    return div;
  }

  /* ── Render gallery from JSON ── */
  async function initGallery() {
    const grid    = document.getElementById('galGrid');
    const loading = document.getElementById('galLoading');

    try {
      const res  = await fetch('images.json');
      if (!res.ok) throw new Error('images.json not found');
      const data = await res.json();

      allItems = flattenData(data);

      loading.remove();

      allItems.forEach(img => {
        const card = buildCard(img);
        grid.appendChild(card);
        card.addEventListener('click',   () => openLightbox(card));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLightbox(card); });
      });

      updateCount();

    } catch (err) {
      loading.textContent = 'Gallery unavailable — ' + err.message;
      console.error(err);
    }
  }

  /* ── Filter logic ── */
  const filterBtns = document.querySelectorAll('.gal-filter');
  const countEl    = document.getElementById('galCount');

  function getItems() {
    return Array.from(document.querySelectorAll('.gal-item'));
  }

  function updateCount() {
    const visible = getItems().filter(i => i.dataset.hidden !== 'true').length;
    countEl.textContent = visible + ' project' + (visible !== 1 ? 's' : '');
  }

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');

      const f = btn.dataset.filter;
      getItems().forEach(item => {
        const show = f === 'all' || item.dataset.filter === f;
        item.dataset.hidden = show ? 'false' : 'true';
      });
      updateCount();
    });
  });

  /* ── Lightbox ── */
  const lb      = document.getElementById('lightbox');
  const lbSurf  = document.getElementById('lbSurface');
  const lbName  = document.getElementById('lbName');
  const lbMat   = document.getElementById('lbMat');
  const lbClose = document.getElementById('lbClose');
  const lbPrev  = document.getElementById('lbPrev');
  const lbNext  = document.getElementById('lbNext');
  const lbCnt   = document.getElementById('lbCounter');

  let visibleItems = [];
  let lbCurrent    = 0;

  function getVisible() {
    return getItems().filter(i => i.dataset.hidden !== 'true');
  }

  function openLightbox(item) {
    visibleItems = getVisible();
    lbCurrent    = visibleItems.indexOf(item);
    renderLb();
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function renderLb() {
    const item = visibleItems[lbCurrent];
    lbSurf.src = 'images/' + item.dataset.src;
    lbSurf.alt = item.dataset.name;
    lbName.textContent = item.dataset.name;
    lbMat.textContent  = item.dataset.material + (item.dataset.location ? ' · ' + item.dataset.location : '');
    lbCnt.textContent  = (lbCurrent + 1) + ' / ' + visibleItems.length;
  }

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', () => { lbCurrent = (lbCurrent - 1 + visibleItems.length) % visibleItems.length; renderLb(); });
  lbNext.addEventListener('click', () => { lbCurrent = (lbCurrent + 1) % visibleItems.length; renderLb(); });
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  { lbCurrent = (lbCurrent - 1 + visibleItems.length) % visibleItems.length; renderLb(); }
    if (e.key === 'ArrowRight') { lbCurrent = (lbCurrent + 1) % visibleItems.length; renderLb(); }
  });

  let tsX = 0;
  lb.addEventListener('touchstart', e => { tsX = e.changedTouches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tsX;
    if (Math.abs(dx) > 50) {
      lbCurrent = dx < 0
        ? (lbCurrent + 1) % visibleItems.length
        : (lbCurrent - 1 + visibleItems.length) % visibleItems.length;
      renderLb();
    }
  }, { passive: true });

  /* ── Init ── */
  initGallery();
  </script>

</body>
</html>
