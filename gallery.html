    /* ── Gallery page ── */
    .gal-page {
      background: var(--ivory);
      min-height: 100vh;
      padding-top: calc(var(--nav-h) + clamp(40px, 5vw, 64px));
      padding-bottom: var(--s-2xl);
    }
    .gal-head {
      max-width: var(--max);
      margin-inline: auto;
      padding-inline: var(--gut);
      margin-bottom: clamp(40px, 5vw, 64px);
    }
    .gal-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone-l);
      margin-bottom: clamp(24px, 3vw, 40px);
      transition: color var(--dur-fast), gap var(--dur-mid) var(--ease);
    }
    .gal-back:hover { color: var(--ink); gap: 12px; }
    .gal-head__title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: var(--t-h2);
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: clamp(24px, 3vw, 36px);
    }
    .gal-head__title em { font-style: italic; color: var(--stone); }
    .gal-filters {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--sand);
    }
    .gal-filter {
      position: relative;
      padding: 12px 22px;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone-l);
      background: transparent;
      border: none;
      transition: color var(--dur-fast);
      cursor: pointer;
    }
    .gal-filter::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 1px;
      background: var(--ink);
      transition: width var(--dur-mid) var(--ease);
    }
    .gal-filter:hover { color: var(--ink); }
    .gal-filter.active { color: var(--ink); }
    .gal-filter.active::after { width: 100%; }
    .gal-count {
      margin-left: auto;
      font-family: var(--sans);
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--stone-l);
      padding: 12px 0;
    }
    .gal-grid {
      max-width: var(--max);
      margin-inline: auto;
      padding-inline: var(--gut);
      padding-top: clamp(24px, 3vw, 40px);
      columns: 3;
      column-gap: 3px;
    }
    .gal-item {
      break-inside: avoid;
      margin-bottom: 3px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .gal-item[data-hidden="true"] { display: none; }
    .gal-swatch {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .gal-item:hover .gal-swatch { transform: scale(1.04); }
    .gal-item__over {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(8, 7, 6, 0.82) 0%,
        rgba(8, 7, 6, 0.44) 28%,
        rgba(8, 7, 6, 0.10) 55%,
        transparent 80%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px 20px 20px;
    }
    .gal-item:hover .gal-item__over {
      background: linear-gradient(
        to top,
        rgba(8, 7, 6, 0.90) 0%,
        rgba(8, 7, 6, 0.56) 35%,
        rgba(8, 7, 6, 0.18) 65%,
        transparent 86%
      );
    }
    .gal-item__name {
      font-family: var(--sans);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(236, 230, 221, 0.96);
      text-shadow: 0 1px 5px rgba(0,0,0,0.95), 0 2px 14px rgba(0,0,0,0.75);
      line-height: 1.4;
    }
    .gal-item__mat {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(214, 204, 192, 0.90);
      text-shadow: 0 1px 4px rgba(0,0,0,0.90), 0 2px 10px rgba(0,0,0,0.70);
      margin-top: 3px;
      line-height: 1.4;
    }
    .gal-item__expand {
      position: absolute;
      top: 12px; right: 12px;
      width: 26px; height: 26px;
      border: 1px solid rgba(236, 230, 221, 0.50);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(236, 230, 221, 0.75);
      background: rgba(0, 0, 0, 0.32);
      opacity: 0.60;
      transition: opacity 0.25s ease, background 0.25s ease;
    }
    .gal-item:hover .gal-item__expand {
      opacity: 1;
      background: rgba(0, 0, 0, 0.55);
      border-color: rgba(236, 230, 221, 0.85);
    }
    .gal-loading {
      text-align: center;
      padding: 80px 20px;
      font-family: var(--sans);
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--stone-l);

  <script>
  'use strict';

  const EXPAND_ICON = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2h3M2 2v3M10 2H7M10 2v3M2 10h3M2 10V7M10 10H7M10 10V7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>`;

  let allItems = [];

  /* ── Flatten manifest ── */
  function flattenData(data) {
    const items = [];
    function addItems(arr, filter) {
      if (!Array.isArray(arr)) return;
      arr.forEach(img => items.push({
        src:      img.src,
        name:     img.name     || '',
        material: img.material || '',
        location: img.location || '',
        filter
      }));
    }
    if (data.residential) Object.values(data.residential).forEach(a => addItems(a, 'residential'));
    if (data.commercial)  Object.values(data.commercial).forEach(a => addItems(a, 'commercial'));
    if (Array.isArray(data.industrial)) addItems(data.industrial, 'industrial');
    if (data.exterior)    Object.values(data.exterior).forEach(a => addItems(a, 'exterior'));
    if (Array.isArray(data.signature))  addItems(data.signature, 'signature');
    return items;
  }

  /* ── Build card ── */
  function buildCard(img) {
    const div = document.createElement('div');
    div.className        = 'gal-item';
    div.role             = 'listitem';
    div.tabIndex         = 0;
    div.dataset.filter   = img.filter;
    div.dataset.hidden   = 'false';
    div.dataset.name     = img.name;
    div.dataset.material = img.material;
    div.dataset.location = img.location;
    div.dataset.src      = img.src;
    div.innerHTML = `
      <img class="gal-swatch" src="images/${img.src}" alt="${img.name}" loading="lazy" decoding="async" />
      <div class="gal-item__over">
        <div class="gal-item__expand">${EXPAND_ICON}</div>
        <span class="gal-item__name">${img.name}</span>
        <span class="gal-item__mat">${img.material}</span>
      </div>`;
    return div;
  }

  /* ── Init gallery ── */
  async function initGallery() {
    const grid    = document.getElementById('galGrid');
    const loading = document.getElementById('galLoading');
    try {
      const res  = await fetch("images.json", { cache: "no-cache" });
      if (!res.ok) throw new Error('images.json not found');
      const data = await res.json();
      allItems   = flattenData(data);
      loading.remove();
      allItems.forEach(img => {
        const card = buildCard(img);
        grid.appendChild(card);
        card.addEventListener('click',   () => openLightbox(card));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLightbox(card); });
      });
      updateCount();
    } catch (err) {
      console.error('[Gallery]', err); loading.textContent = 'Gallery unavailable — ' + err.message; loading.style.color='rgba(220,100,100,0.8)';
    }
  }

  /* ── Filter ── */
  const filterBtns = document.querySelectorAll('.gal-filter');
  const countEl    = document.getElementById('galCount');
  function getItems() { return Array.from(document.querySelectorAll('.gal-item')); }
  function updateCount() {
    const n = getItems().filter(i => i.dataset.hidden !== 'true').length;
    countEl.textContent = n + ' project' + (n !== 1 ? 's' : '');
  }
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
      const f = btn.dataset.filter;
      getItems().forEach(item => { item.dataset.hidden = (f === 'all' || item.dataset.filter === f) ? 'false' : 'true'; });
      updateCount();
    });
  });

  /* ── Lightbox ── */
  const lb      = document.getElementById('lightbox');
  const lbSurf  = document.getElementById('lbSurface');
  const lbName  = document.getElementById('lbName');
  const lbMat   = document.getElementById('lbMat');
  const lbClose = document.getElementById('lbClose');
  const lbPrev  = document.getElementById('lbPrev');
  const lbNext  = document.getElementById('lbNext');
  const lbCnt   = document.getElementById('lbCounter');

  let visibleItems = [];
  let lbCurrent    = 0;

  function getVisible() { return getItems().filter(i => i.dataset.hidden !== 'true'); }

  function openLightbox(item) {
    visibleItems = getVisible();
    lbCurrent    = visibleItems.indexOf(item);
    renderLb();
    lb.classList.add('open');
    lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  function renderLb() {
    const item = visibleItems[lbCurrent];
    if (!item) return;
    lbSurf.src = 'images/' + item.dataset.src;
    lbSurf.alt = item.dataset.name;
    lbName.textContent = item.dataset.name;
    lbMat.textContent  = item.dataset.material
      + (item.dataset.location ? ' · ' + item.dataset.location : '');
    lbCnt.textContent  = (lbCurrent + 1) + ' / ' + visibleItems.length;
  }

  function prevImg() { lbCurrent = (lbCurrent - 1 + visibleItems.length) % visibleItems.length; renderLb(); }
  function nextImg() { lbCurrent = (lbCurrent + 1) % visibleItems.length; renderLb(); }

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click',  prevImg);
  lbNext.addEventListener('click',  nextImg);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  prevImg();
    if (e.key === 'ArrowRight') nextImg();
  });

  let tsX = 0;
  lb.addEventListener('touchstart', e => { tsX = e.changedTouches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tsX;
    if (Math.abs(dx) > 45) { dx < 0 ? nextImg() : prevImg(); }
  }, { passive: true });

  /* ══════════════════════════════════════════════════════
     FIX 3 — NAV MOBIL: script corect cu backdrop
     Reproduce exact logica din script.js (index.html)
     ══════════════════════════════════════════════════════ */
  (function() {
    'use strict';
    const burger   = document.getElementById('navBurger');
    const panel    = document.getElementById('navPanel');
    const backdrop = document.getElementById('navBackdrop');
    if (!burger || !panel) return;
    const btn = burger.cloneNode(true);
    burger.parentNode.replaceChild(btn, burger);

    const scroll   = document.getElementById('menuScroll');
    const items = panel ? Array.from(panel.querySelectorAll('.nav__item')) : [];
    const opacities = [1, 0.40, 0.10];

    function updateFade() {
      if (!scroll) return;
      const containerTop = scroll.getBoundingClientRect().top;
      let closestIdx = 0, closestDist = Infinity;
      items.forEach((item, i) => {
        const dist = Math.abs(item.getBoundingClientRect().top - containerTop);
        if (dist < closestDist) { closestDist = dist; closestIdx = i; }
      });
      items.forEach((item, i) => {
        const delta = i - closestIdx;
        const op = opacities[Math.min(Math.abs(delta), opacities.length - 1)];
        item.style.opacity = op;
      });
    }

    function openNav() {
      panel.classList.add('open');
      panel.setAttribute('aria-hidden', 'false');
      btn.setAttribute('aria-expanded', 'true');
      btn.setAttribute('aria-label', 'Close menu');
      if (backdrop) backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
      if (scroll) scroll.scrollTop = 0;
      setTimeout(updateFade, 50);
    }
    function closeNav() {
      panel.classList.remove('open');
      panel.setAttribute('aria-hidden', 'true');
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-label', 'Open menu');
      if (backdrop) backdrop.classList.remove('open');
      document.body.style.overflow = '';
    }

    btn.addEventListener('click', () =>
      panel.classList.contains('open') ? closeNav() : openNav()
    );
    if (backdrop) backdrop.addEventListener('click', closeNav);
    if (scroll) scroll.addEventListener('scroll', updateFade, { passive: true });
    items.forEach(a => { if (a.tagName === 'A') a.addEventListener('click', closeNav); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && panel.classList.contains('open')) { closeNav(); btn.focus(); }
    });

    const yr = document.getElementById('yr');
    if (yr) yr.textContent = new Date().getFullYear();
  })();

  /* ── URL filter param ── */
  (function() {
    const p = new URLSearchParams(window.location.search);
    const f = p.get('filter') || p.get('domain');
    if (!f || f === 'all') return;
    const btn = document.querySelector(`.gal-filter[data-filter="${f}"]`);
    if (btn) btn.click();
  })();

  const yrEl = document.getElementById('yr');
  if (yrEl) yrEl.textContent = new Date().getFullYear();

  /* ── Cursor custom inline ── */
  (function() {
    const cur  = document.getElementById('cursor');
    if (!cur || 'ontouchstart' in window) { if (cur) cur.style.display = 'none'; return; }
    const ring = cur.querySelector('.cursor__ring');
    const dot  = cur.querySelector('.cursor__dot');
    let cx = 0, cy = 0, rx = 0, ry = 0, raf = null, visible = false;
    const lerp = (a, b, t) => a + (b - a) * t;
    function tick() {
      rx = lerp(rx, cx, 0.1); ry = lerp(ry, cy, 0.1);
      if (dot)  { dot.style.left  = cx + 'px'; dot.style.top  = cy + 'px'; }
      if (ring) { ring.style.left = rx.toFixed(2) + 'px'; ring.style.top = ry.toFixed(2) + 'px'; }
      raf = requestAnimationFrame(tick);
    }
    document.addEventListener('mousemove', e => {
      cx = e.clientX; cy = e.clientY;
      if (!visible) { cur.style.opacity = '1'; visible = true; if (!raf) tick(); }
    });
    document.addEventListener('mouseover', e => {
      if (e.target.closest('a,button,[data-cursor="link"]')) cur.classList.add('hovering');
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest('a,button,[data-cursor="link"]')) cur.classList.remove('hovering');
    });
    document.addEventListener('mouseleave', () => { cur.style.opacity = '0'; });
    document.addEventListener('mouseenter', () => { cur.style.opacity = '1'; });
  })();

  /* ── Progress bar inline ── */
  (function() {
    const prog = document.getElementById('progress');
    if (!prog) return;
    window.addEventListener('scroll', function() {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      prog.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0).toFixed(2) + '%';
    }, { passive: true });
  })();

  initGallery();
  </script>

</body>
